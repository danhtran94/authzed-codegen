linters-settings:
  depguard:
    rules:
      pkg-no-internal:
        files:
          - "**/pkg/**"
        deny:
          - pkg: "github.com/danhtran94/authzed-codegen/internal"
            desc: "pkg/ is the runtime contract consumed by generated code; it must not depend on internal/"

linters:
  enable:
    - depguard
